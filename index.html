	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>Presafe Solution | 顧客意向の収集および製品紹介</title>
	    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
	    <style>
	        /* ========== 基础重置 ========== */
	        *, *::before, *::after {
	            margin: 0;
	            padding: 0;
	            box-sizing: border-box;
	        }
	        :root {
	            --primary: #4F46E5;
	            --primary-light: #818CF8;
	            --primary-dark: #3730A3;
	            --accent: #F59E0B;
	            --bg: #F8FAFC;
	            --bg-card: #FFFFFF;
	            --text: #1E293B;
	            --text-muted: #64748B;
	            --border: #E2E8F0;
	            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -1px rgba(0,0,0,0.04);
	            --shadow-xl: 0 25px 50px -12px rgba(79, 70, 229, 0.25);
	            --radius: 16px;
	            --radius-sm: 10px;
	            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
	        }
	        html { scroll-behavior: smooth; }
	        body {
	            font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
	            background: var(--bg);
	            color: var(--text);
	            line-height: 1.6;
	            overflow-x: hidden;
	            position: relative;
	        }
	        /* ========== 背景装饰 ========== */
	        .bg-decoration {
	            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
	            z-index: -1; overflow: hidden; pointer-events: none;
	        }
	        .bg-blob {
	            position: absolute; border-radius: 50%; filter: blur(80px);
	            opacity: 0.15; animation: float 20s ease-in-out infinite;
	        }
	        .bg-blob:nth-child(1) { width: 500px; height: 500px; background: var(--primary); top: -200px; right: -100px; }
	        .bg-blob:nth-child(2) { width: 400px; height: 400px; background: var(--accent); bottom: -150px; left: -100px; animation-delay: -7s; }
	        .bg-blob:nth-child(3) { width: 350px; height: 350px; background: #10B981; top: 40%; left: 50%; animation-delay: -14s; }
	        @keyframes float {
	            0%, 100% { transform: translate(0, 0) scale(1); }
	            33% { transform: translate(50px, -50px) scale(1.1); }
	            66% { transform: translate(-30px, 30px) scale(0.95); }
	        }
	        .grid-bg {
	            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
	            background-image: 
	                linear-gradient(rgba(79, 70, 229, 0.03) 1px, transparent 1px),
	                linear-gradient(90deg, rgba(79, 70, 229, 0.03) 1px, transparent 1px);
	            background-size: 50px 50px; pointer-events: none;
	        }
	        .container {
	            max-width: 1000px; margin: 0 auto; padding: 0 24px;
	        }
	        /* ========== 头部区域 ========== */
	        .hero { padding: 80px 0 60px; text-align: center; }
	        .hero-badge {
	            display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px;
	            background: rgba(79, 70, 229, 0.08); border: 1px solid rgba(79, 70, 229, 0.15);
	            border-radius: 100px; color: var(--primary); font-size: 14px; font-weight: 500;
	            margin-bottom: 24px; animation: fadeInDown 0.8s ease;
	        }
	        .hero-badge .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
	        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
	        .hero h1 {
	            font-size: clamp(36px, 5vw, 56px); font-weight: 900; letter-spacing: -0.02em;
	            margin-bottom: 20px; background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
	            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
	            animation: fadeInUp 0.8s ease 0.1s both;
	        }
	        .hero p { font-size: 18px; color: var(--text-muted); max-width: 600px; margin: 0 auto; animation: fadeInUp 0.8s ease 0.2s both; }
	        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
	        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
	        /* ========== 时间线与卡片 ========== */
	        .timeline { position: relative; padding-left: 60px; margin-bottom: 60px; }
	        .timeline::before {
	            content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px;
	            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-light) 50%, var(--border) 100%);
	        }
	        .image-card, .action-card {
	            position: relative; background: var(--bg-card); border-radius: var(--radius);
	            margin-bottom: 40px; box-shadow: var(--shadow-md); transition: var(--transition);
	            overflow: hidden; border: 1.5px solid transparent; animation: fadeInUp 0.6s ease both;
	        }
	        .image-card:nth-child(1) { animation-delay: 0.3s; }
	        .image-card:nth-child(2) { animation-delay: 0.4s; }
	        .image-card:nth-child(3) { animation-delay: 0.5s; }
	        .image-card:nth-child(4) { animation-delay: 0.6s; }
	        .image-card:nth-child(5) { animation-delay: 0.7s; }
	        .image-card:nth-child(6) { animation-delay: 0.8s; }
	        .image-card:nth-child(7) { animation-delay: 0.9s; }
	        .image-card:nth-child(8) { animation-delay: 1.0s; }
	        .image-card:nth-child(9) { animation-delay: 1.1s; }
			.image-card:nth-child(10) { animation-delay: 1.2s; }
			.image-card:nth-child(11) { animation-delay: 1.3s; }
			.image-card:nth-child(12) { animation-delay: 1.4s; }
	        .image-card:hover, .action-card:hover {
	            transform: translateY(-6px); box-shadow: var(--shadow-xl); border-color: rgba(79, 70, 229, 0.2);
	        }
	        .image-card:hover img { transform: scale(1.02); }
	        .timeline-node {
	            position: absolute; left: -52px; top: 24px; width: 40px; height: 40px;
	            background: var(--bg-card); border: 3px solid var(--primary); border-radius: 50%;
	            display: flex; align-items: center; justify-content: center; font-size: 14px;
	            font-weight: 800; color: var(--primary); z-index: 2; transition: var(--transition);
	            box-shadow: 0 0 0 4px var(--bg);
	        }
	        .image-card:hover .timeline-node, .action-card:hover .timeline-node {
	            background: var(--primary); color: white; transform: scale(1.1);
	        }
	        .card-image-container { width: 100%; overflow: hidden; display: flex; justify-content: center; background: #f1f5f9; }
	        .card-image-container img { width: 100%; height: auto; display: block; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
	        /* ========== 下载与表单模块样式 ========== */
	        .action-content { padding: 40px; }
	        /* 下载卡片 */
	        .download-box { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
	        .download-icon {
	            flex-shrink: 0; width: 80px; height: 80px; border-radius: 20px;
	            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
	            display: flex; align-items: center; justify-content: center;
	            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
	        }
	        .download-icon svg { width: 40px; height: 40px; color: white; }
	        .download-info { flex: 1; min-width: 250px; }
	        .download-info h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
	        .download-info p { color: var(--text-muted); font-size: 15px; }
	        /* 按钮通用样式 */
	        .action-btn {
	            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
	            padding: 14px 28px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
	            cursor: pointer; transition: var(--transition); border: none; text-decoration: none;
	            font-family: inherit;
	        }
	        .action-btn.primary { background: var(--primary); color: white; }
	        .action-btn.primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3); }
	        .action-btn svg { width: 18px; height: 18px; }
	        /* 表单卡片 */
	        .form-header { text-align: center; margin-bottom: 32px; }
	        .form-header h3 { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: var(--text); }
	        .form-header p { color: var(--text-muted); font-size: 15px; }
	        .lead-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
	        .form-group { display: flex; flex-direction: column; }
	        .form-group.full-width { grid-column: 1 / -1; }
	        .form-group label { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
	        .form-input {
	            padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
	            font-size: 15px; font-family: inherit; background: var(--bg); color: var(--text);
	            transition: var(--transition); outline: none;
	        }
	        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); background: white; }
	        .form-submit { grid-column: 1 / -1; margin-top: 10px; }
	        .submit-btn { width: 100%; padding: 16px; font-size: 16px; }
	        /* 提交成功提示 */
	        .form-success {
	            display: none; text-align: center; padding: 40px;
	            background: rgba(16, 185, 129, 0.05); border-radius: var(--radius-sm); border: 1px solid rgba(16, 185, 129, 0.2);
	        }
	        .form-success.show { display: block; animation: fadeInUp 0.5s ease; }
	        .form-success svg { width: 56px; height: 56px; color: #10B981; margin-bottom: 16px; }
	        .form-success h3 { color: #10B981; margin-bottom: 8px; }
	        /* ========== 底部 ========== */
	        .footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }
	        /* ========== 回到顶部按钮 ========== */
	        .back-to-top {
	            position: fixed; bottom: 30px; right: 30px; width: 48px; height: 48px;
	            background: var(--primary); color: white; border: none; border-radius: 50%;
	            cursor: pointer; display: flex; align-items: center; justify-content: center;
	            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); opacity: 0; visibility: hidden;
	            transition: var(--transition); z-index: 100;
	        }
	        .back-to-top.visible { opacity: 1; visibility: visible; }
	        .back-to-top:hover { background: var(--primary-dark); transform: translateY(-3px); }
	        .back-to-top svg { width: 20px; height: 20px; }
	        /* ========== 响应式 ========== */
	        @media (max-width: 768px) {
	            .timeline { padding-left: 40px; }
	            .timeline-node { left: -32px; width: 28px; height: 28px; font-size: 12px; border-width: 2px; }
	            .image-card, .action-card { margin-bottom: 24px; }
	            .action-content { padding: 24px; }
	            .download-box { flex-direction: column; text-align: center; }
	            .lead-form { grid-template-columns: 1fr; }
	        }
	    </style>
	</head>

	    <script>
	        // 回到顶部按钮显示/隐藏
	        const backToTop = document.getElementById('backToTop');
	        window.addEventListener('scroll', function() {
	            backToTop.classList.toggle('visible', window.pageYOffset > 400);
	        });
	        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
	        // 表单提交交互处理
	        const form = document.getElementById('leadForm');
	        const formSuccess = document.getElementById('formSuccess');
	        const formHeader = document.getElementById('formHeader');
	        form.addEventListener('submit', function(e) {
	            // 阻止默认跳转行为，让我们用 AJAX 提交
	            e.preventDefault();
	            const formData = new FormData(form);
	            const action = form.getAttribute('action');
	            // 如果用户还没配置 Formspree 链接，给个友好提示
	            if (action.includes('YOUR_FORM_ID')) {
	                alert('管理者へ：フォームを有効にするため、コード内の action 属性を Formspree のリンクに書き換えてください。');
	                return;
	            }
	            // 发送数据到 Formspree
	            fetch(action, {
	                method: 'POST',
	                body: formData,
	                headers: { 'Accept': 'application/json' }
	            }).then(response => {
	                if (response.ok) {
	                    // 隐藏表单，显示成功信息
	                    form.style.display = 'none';
	                    formHeader.style.display = 'none';
	                    formSuccess.classList.add('show');
	                    form.reset();
	                } else {
	                    alert('送信に失敗しました。しばらくしてからもう一度お試しください。');
	                }
	            }).catch(error => {
	                alert('通信エラーが発生しました。');
	            });
	        });
	    </script>
	</body>
	</html>
